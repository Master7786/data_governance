resources:
  apps:
    sample_app:
      name: "sample-app"
      description: "sample app"

      # The location of the source code for the app.
      source_code_path: ../src/app/ui
      resources:
        - name: secret           # "Resource key" in the UI
          secret:
            scope: security      # Secret scope dropdown
            key: client-id       # Secret key dropdown
            permission: READ     # "Can read" in the UI  
