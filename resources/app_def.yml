resources:
  apps:
    sample_app:
      name: "sample-app"
      description: "sample app"

      # The location of the source code for the app.
      source_code_path: ../src/app/ui
      resources:
        - name: client-id
          secret:
            scope: security
            key: client-id
            permission: READ
        - name: client-secret
          secret:
            scope: security
            key: client-secret
            permission: READ
