name: Deploy Databricks Bundle

on:
  pull_request:
    branches:
      - main
    types:
      - closed

concurrency:
  group: databricks-dev
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Python Wheel
        run: |
          uv build --wheel

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      ##########################################################
      # Diagnostics
      ##########################################################

      - name: Show Databricks CLI Version
        run: |
          databricks version
          databricks bundle schema

      - name: Authentication
        run: |
          databricks auth env
          databricks current-user me

      - name: Repository Structure
        run: |
          pwd
          find .

      - name: Bundle Summary
        run: |
          databricks bundle summary --target dev --var developer="${{ github.actor }}" || true

      ##########################################################
      # Validate Bundle
      ##########################################################

      - name: Validate Bundle
        run: |
          databricks bundle validate --target dev --var developer="${{ github.actor }}"

      ##########################################################
      # Deploy Bundle
      ##########################################################

      - name: Deploy Bundle
        run: |
          databricks bundle deploy \
            --target dev \
            --var developer="${{ github.actor }}" \
            --auto-approve \
            --force-lock \

      ##########################################################
      # Deploy Streamlit App Source
      ##########################################################

      - name: Deploy App Source
        run: |
          databricks bundle run sample_app --target dev --var developer="${{ github.actor }}" 

      # - name: Deploy App Source
