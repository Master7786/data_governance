- name: Databricks Diagnostics
  shell: bash
  run: |
    echo "========== Databricks CLI =========="
    databricks version

    echo ""
    echo "========== Authentication =========="
    databricks auth env

    echo ""
    echo "========== Current User =========="
    databricks current-user me

    echo ""
    echo "========== Bundle Summary =========="
    databricks bundle summary --target dev || true

    echo ""
    echo "========== Bundle Validate =========="
    databricks bundle validate --target dev

    echo ""
    echo "========== Bundle Schema =========="
    databricks bundle schema > bundle-schema.json
    head -100 bundle-schema.json

    echo ""
    echo "========== Repository Structure =========="
    pwd
    ls -la
    echo ""
    find . -maxdepth 4 -type f | sort

    echo ""
    echo "========== App Source =========="
    ls -la src/app/ui || true

    echo ""
    echo "========== requirements.txt =========="
    cat src/app/ui/requirements.txt || true

    echo ""
    echo "========== app.py =========="
    head -50 src/app/ui/app.py || true

    echo ""
    echo "========== app.yml =========="
    cat resources/app.yml

    echo ""
    echo "========== databricks.yml =========="
    cat databricks.yml

    echo ""
    echo "========== Bundle Config =========="
    databricks bundle validate --target dev --output json || true
