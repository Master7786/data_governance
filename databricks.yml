bundle:
  name: data_governance

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  dev:
    default: true
    mode: development

    workspace:
      host: ${env.DATABRICKS_HOST}

    run_as:
      service_principal_name: ${{vars.DATABRICKS_CLIENT_ID}}

  prod:
    mode: production

    workspace:
      host: ${env.DATABRICKS_HOST}

    run_as:
      service_principal_name: ${{vars.DATABRICKS_CLIENT_ID}}
