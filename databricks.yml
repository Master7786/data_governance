bundle:
  name: data_governance

variables:
  developer:
    description: GitHub user
    default: local
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-8fff8432-25ee.cloud.databricks.com/
      root_path: ~/.bundle/${bundle.name}/${var.developer}/${bundle.target}
    run_as:
      service_principal_name: fd4e2907-b2e0-4c55-8d7d-41c12df3a12c

  prod:
    mode: production
    workspace:
      host: https://dbc-8fff8432-25ee.cloud.databricks.com
      root_path: /Workspace/Shared/data_governance/${bundle.target}
    run_as:
      service_principal_name: fd4e2907-b2e0-4c55-8d7d-41c12df3a12c
